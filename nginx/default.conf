server {
    listen 10000;
    client_max_body_size 100m;

    # Global timeouts
    proxy_read_timeout 600s;
    proxy_connect_timeout 30s;
    client_body_timeout 600s;
    send_timeout 600s;

    # CORS headers – applied to every response (including errors) using "always"
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, x-project-ref, x-client-info, apikey" always;

    # Handle preflight OPTIONS – returns 204 with CORS headers (due to "always" above)
    if ($request_method = OPTIONS) {
        return 204;
    }

    # Strip any upstream CORS headers to avoid duplicates
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;

    # SQL endpoint (both GET and POST)
    location /sql/ {
        proxy_pass http://127.0.0.1:3007/;
        proxy_set_header x-project-ref $http_x_project_ref;
    }

    # Project manager
    location /projects {
        proxy_pass http://127.0.0.1:3002/projects;
        proxy_set_header x-project-ref $http_x_project_ref;
    }

    # Auth
    location /auth/ {
        proxy_pass http://127.0.0.1:3001/;
    }

    # Storage
    location /storage/ {
        proxy_pass http://127.0.0.1:3004/;
        proxy_set_header x-project-ref $http_x_project_ref;
    }

    # Edge functions
    location /edge/ {
        proxy_pass http://127.0.0.1:3005/;
    }

    # AI assistant
    location /ai/ {
        proxy_pass http://127.0.0.1:3006/;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:3006/health;
    }
}
