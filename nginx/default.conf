server {
    listen 10000;

    client_max_body_size 100m;
    proxy_read_timeout 600s;
    proxy_connect_timeout 30s;
    client_body_timeout 600s;
    send_timeout 600s;

    # Global CORS headers – applied to every response (including 204 and errors)
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, x-project-ref, x-client-info, apikey" always;

    # Handle preflight OPTIONS separately but still with CORS headers
    location @preflight {
        return 204;
    }

    # Strip any upstream CORS headers to avoid duplicates
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;

    # Redirect OPTIONS to preflight
    if ($request_method = OPTIONS) {
        return 204;
    }

    location /sql/ {
        proxy_pass http://127.0.0.1:3007/;
        proxy_set_header x-project-ref $http_x_project_ref;
    }

    location /projects {
        proxy_pass http://127.0.0.1:3002/projects;
        proxy_set_header x-project-ref $http_x_project_ref;
    }

    location /auth/ {
        proxy_pass http://127.0.0.1:3001/;
    }

    location /storage/ {
        proxy_pass http://127.0.0.1:3004/;
        proxy_set_header x-project-ref $http_x_project_ref;
    }

    location /edge/ {
        proxy_pass http://127.0.0.1:3005/;
    }

    location /ai/ {
        proxy_pass http://127.0.0.1:3006/;
    }

    location /health {
        proxy_pass http://127.0.0.1:3006/health;
    }
}
