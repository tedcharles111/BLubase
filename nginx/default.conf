# Redirect all HTTP to HTTPS
server {
    listen 10000;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 10000 ssl;
    # (Render provides SSL, so the actual traffic is already encrypted; this just ensures no plain HTTP leaves)
    
    add_header Access-Control-Allow-Origin *;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, x-project-ref";

    # Handle preflight OPTIONS requests
    if ($request_method = OPTIONS) {
        return 200;
    }

    location /health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # Project manager – must forward without any path mangling
    location /projects {
        proxy_pass http://127.0.0.1:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Auth server
    location /auth/ {
        proxy_pass http://127.0.0.1:3001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SQL editor
    location /sql/ {
        proxy_pass http://127.0.0.1:3007/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Storage
    location /storage/ {
        proxy_pass http://127.0.0.1:3004;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Edge functions
    location /edge/ {
        proxy_pass http://127.0.0.1:3005;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # AI assistant
    location /ai/ {
        proxy_pass http://127.0.0.1:3006/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket
    location /ws {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Fallback (for any other path)
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
