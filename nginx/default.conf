server {
    listen 10000;
    client_max_body_size 100m;

    # Global timeouts – nothing gets stuck
    proxy_read_timeout 300s;
    proxy_connect_timeout 15s;
    client_body_timeout 300s;
    send_timeout 300s;

    # CORS headers that survive ANY response (2xx, 4xx, 5xx)
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, x-project-ref, x-client-info, apikey" always;

    # Preflight – handled immediately, always adds the headers above
    if ($request_method = OPTIONS) {
        return 204;
    }

    # Custom error page that injects CORS headers (just in case)
    error_page 502 504 /error_502.html;
    location = /error_502.html {
        internal;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, x-project-ref, x-client-info, apikey";
        return 502;
    }

    # Strip upstream CORS headers to avoid duplicates
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;

    location /sql/ {
        proxy_pass http://127.0.0.1:3007/;
        proxy_set_header x-project-ref $http_x_project_ref;
        # Dedicated timeout for the SQL service
        proxy_read_timeout 300s;
        proxy_connect_timeout 15s;
    }

    location /projects {
        proxy_pass http://127.0.0.1:3002/projects;
        proxy_set_header x-project-ref $http_x_project_ref;
    }

    location /auth/ {
        proxy_pass http://127.0.0.1:3001/;
    }

    location /storage/ {
        proxy_pass http://127.0.0.1:3004/;
        proxy_set_header x-project-ref $http_x_project_ref;
    }

    location /edge/ {
        proxy_pass http://127.0.0.1:3005/;
    }

    location /ai/ {
        proxy_pass http://127.0.0.1:3006/;
    }

    location /health {
        proxy_pass http://127.0.0.1:3006/health;
    }
}
