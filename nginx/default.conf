server {
    listen 10000;
    client_max_body_size 100m;

    # Timeouts – never let the gateway close
    proxy_read_timeout 600s;
    proxy_connect_timeout 30s;
    client_body_timeout 600s;
    send_timeout 600s;

    # CORS headers on EVERY response (including 204 and errors)
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, x-project-ref, x-client-info, apikey" always;

    # Handle preflight – the "always" flag above ensures CORS headers are still added
    if ($request_method = OPTIONS) {
        return 204;
    }

    # Strip upstream CORS headers to avoid duplicates
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;

    location /sql/ {
        proxy_pass http://127.0.0.1:3007/;
        proxy_set_header x-project-ref $http_x_project_ref;
    }

    location /projects {
        proxy_pass http://127.0.0.1:3002/projects;
        proxy_set_header x-project-ref $http_x_project_ref;
    }

    location /auth/ {
        proxy_pass http://127.0.0.1:3001/;
    }

    location /storage/ {
        proxy_pass http://127.0.0.1:3004/;
        proxy_set_header x-project-ref $http_x_project_ref;
    }

    location /edge/ {
        proxy_pass http://127.0.0.1:3005/;
    }

    location /ai/ {
        proxy_pass http://127.0.0.1:3006/;
    }

    location /health {
        proxy_pass http://127.0.0.1:3006/health;
    }
}
